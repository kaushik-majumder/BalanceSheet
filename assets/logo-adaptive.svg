<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Android adaptive icon foreground: ONLY the white mark on a
       transparent background. The system applies the emerald
       background via app.config.js adaptiveIcon.backgroundColor.
       Content stays within the central 660x660 safe zone so the
       OS masking (circle/squircle/round-square) never crops the
       mark. -->
  <defs>
    <filter id="markShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="6" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.22" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#markShadow)" fill="#FFFFFF">
    <rect x="492" y="170" width="44" height="694" rx="22" />
    <path d="
      M 360 280
      C 360 230 410 200 470 200
      L 590 200
      C 660 200 700 250 700 320
      C 700 390 660 440 590 440
      L 470 440
      C 410 440 360 410 360 360
      Z
      M 590 290
      L 470 290
      C 450 290 450 310 470 350
      L 590 350
      C 620 350 620 290 590 290
      Z
    " fill-rule="evenodd" />
    <path d="
      M 600 440
      L 700 600
      L 620 600
      L 540 460
      Z
    " />
    <path d="
      M 656 600
      C 700 600 720 640 700 680
      C 680 720 600 700 540 680
      C 460 660 380 670 350 730
      C 320 800 400 860 500 860
      C 600 860 680 820 700 760
      L 670 760
      C 660 800 600 820 520 820
      C 440 820 410 770 470 750
      C 540 720 620 760 680 730
      C 730 700 740 620 700 590
      C 720 600 660 600 656 600
      Z
    " />
  </g>
</svg>
